<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>手の経穴くじ｜取穴練習アプリ</title>
<style>
  /* ============================================================
     カラー / デザイントークン
     ============================================================ */
  :root{
    --bg-0:#06080c;
    --bg-1:#0b0f16;
    --bg-2:#121826;
    --panel:rgba(20,27,40,0.72);
    --panel-line:rgba(255,255,255,0.08);

    --gold:#e7c97f;
    --gold-soft:#f3e0b0;
    --cyan:#7fe7ef;
    --cyan-deep:#46b6c6;

    --text:#f3f6fa;
    --muted:#9aa7b6;
    --faint:#5f6b7a;

    --card-back-1:#0f1726;
    --card-back-2:#0a0f19;

    --shadow:0 18px 40px -18px rgba(0,0,0,0.85);
    --ease:cubic-bezier(0.2,0.8,0.2,1);

    --radius:18px;
  }

  *{ box-sizing:border-box; }

  html,body{ height:100%; }

  body{
    margin:0;
    color:var(--text);
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",
                "YuGothic","Meiryo",system-ui,sans-serif;
    background:
      radial-gradient(1100px 600px at 18% -10%, rgba(127,231,239,0.10), transparent 60%),
      radial-gradient(900px 600px at 110% 10%, rgba(231,201,127,0.10), transparent 55%),
      radial-gradient(900px 900px at 50% 120%, rgba(70,182,198,0.07), transparent 60%),
      linear-gradient(160deg, var(--bg-1), var(--bg-0) 60%);
    background-attachment:fixed;
    min-height:100%;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  /* 微細なノイズ風グレインで安っぽさを消す */
  body::before{
    content:"";
    position:fixed; inset:0;
    pointer-events:none;
    opacity:0.035;
    background-image:
      repeating-linear-gradient(0deg, #fff 0 1px, transparent 1px 3px),
      repeating-linear-gradient(90deg, #fff 0 1px, transparent 1px 3px);
    mix-blend-mode:overlay;
  }

  .wrap{
    max-width:1120px;
    margin:0 auto;
    padding:clamp(16px,3vw,40px) clamp(14px,3vw,32px) 48px;
    position:relative;
    z-index:1;
  }

  /* ============================================================
     ヘッダー
     ============================================================ */
  header{
    display:flex;
    flex-wrap:wrap;
    align-items:flex-end;
    justify-content:space-between;
    gap:16px 24px;
    margin-bottom:20px;
  }

  .title-block{ min-width:220px; }

  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    letter-spacing:0.28em;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .eyebrow::before{
    content:"";
    width:26px; height:1px;
    background:linear-gradient(90deg,var(--gold),transparent);
  }

  h1{
    margin:0;
    font-size:clamp(26px,4.4vw,46px);
    font-weight:800;
    letter-spacing:0.04em;
    line-height:1.1;
    background:linear-gradient(110deg,#ffffff 10%,var(--gold-soft) 55%,var(--cyan) 110%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 0 32px rgba(231,201,127,0.12);
  }

  .subtitle{
    margin:8px 0 0;
    color:var(--muted);
    font-size:clamp(13px,1.6vw,15px);
    letter-spacing:0.04em;
  }

  .toolbar{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:10px;
  }

  .btn{
    appearance:none;
    border:1px solid var(--panel-line);
    background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.015));
    color:var(--text);
    font-family:inherit;
    font-size:14px;
    font-weight:700;
    letter-spacing:0.04em;
    padding:11px 18px;
    border-radius:12px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:9px;
    transition:transform .18s var(--ease), box-shadow .25s var(--ease),
               border-color .25s, background .25s;
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
  }
  .btn:hover{
    transform:translateY(-2px);
    border-color:rgba(127,231,239,0.45);
    box-shadow:0 10px 26px -12px rgba(127,231,239,0.5);
  }
  .btn:active{ transform:translateY(0) scale(0.98); }

  .btn .ic{ font-size:15px; line-height:1; }

  .btn--primary{
    border-color:rgba(231,201,127,0.5);
    background:linear-gradient(180deg, rgba(231,201,127,0.22), rgba(231,201,127,0.06));
    color:var(--gold-soft);
  }
  .btn--primary:hover{
    border-color:rgba(231,201,127,0.8);
    box-shadow:0 12px 28px -12px rgba(231,201,127,0.55);
  }

  /* ============================================================
     使い方 + ステータス
     ============================================================ */
  .infobar{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:space-between;
    gap:10px 18px;
    padding:13px 18px;
    margin-bottom:22px;
    border:1px solid var(--panel-line);
    border-radius:14px;
    background:var(--panel);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
  }

  .steps{
    display:flex;
    flex-wrap:wrap;
    gap:8px 14px;
    align-items:center;
  }
  .step{
    display:inline-flex;
    align-items:center;
    gap:9px;
    font-size:13px;
    color:var(--muted);
    letter-spacing:0.02em;
  }
  .step b{ color:var(--text); font-weight:700; }
  .step .num{
    width:22px; height:22px;
    flex:0 0 auto;
    display:grid; place-items:center;
    border-radius:50%;
    font-size:12px;
    font-weight:800;
    color:var(--bg-0);
    background:linear-gradient(135deg,var(--cyan),var(--gold));
  }
  .step-sep{ color:var(--faint); }

  .status{
    display:inline-flex;
    align-items:center;
    gap:10px;
    font-size:13px;
    color:var(--muted);
    white-space:nowrap;
  }
  .status .count{
    font-weight:800;
    font-variant-numeric:tabular-nums;
    color:var(--gold-soft);
    font-size:15px;
  }
  .status .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--cyan);
    box-shadow:0 0 10px var(--cyan);
  }

  /* ============================================================
     カードグリッド（選択用デッキ）
     ============================================================ */
  .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:clamp(10px,1.8vw,22px);
  }

  .card{
    position:relative;
    aspect-ratio:3/4;
    border-radius:var(--radius);
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    outline:none;
    transition:transform .25s var(--ease), box-shadow .25s var(--ease);
  }

  /* 入場アニメーション */
  .card.enter{ animation:dealIn .55s var(--ease) backwards; }
  @keyframes dealIn{
    0%{ opacity:0; transform:translateY(26px) rotateX(-14deg) scale(0.92); }
    100%{ opacity:1; transform:translateY(0) rotateX(0) scale(1); }
  }

  @media(hover:hover){
    .card:hover{ transform:translateY(-6px); box-shadow:0 20px 40px -22px rgba(127,231,239,0.55); }
  }
  .card:active{ transform:scale(0.97); }
  .card:focus-visible{ box-shadow:0 0 0 2px var(--cyan); }

  /* 確認済みカードの印 */
  .card.viewed{ filter:saturate(0.8) brightness(0.92); }
  .card .seen-badge{
    position:absolute; top:8px; right:8px;
    width:22px; height:22px;
    display:none; place-items:center;
    border-radius:50%;
    font-size:13px; font-weight:800;
    color:var(--bg-0);
    background:linear-gradient(135deg,var(--cyan),var(--gold));
    box-shadow:0 4px 12px -3px rgba(0,0,0,.6);
    z-index:3;
  }
  .card.viewed .seen-badge{ display:grid; }

  .card__face{
    position:absolute;
    inset:0;
    border-radius:var(--radius);
    overflow:hidden;
    border:1px solid var(--panel-line);
    box-shadow:var(--shadow);
    display:flex;
  }

  /* ---- 面の表示切替（data-mode で制御）---- */
  .face-back,.face-name,.face-detail{ display:none; width:100%; height:100%; }
  [data-mode="back"]   .face-back{ display:flex; }
  [data-mode="name"]   .face-name{ display:flex; }
  [data-mode="detail"] .face-detail{ display:flex; }

  /* ============================================================
     裏面デザイン
     ============================================================ */
  .face-back{
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(120% 90% at 50% 0%, rgba(127,231,239,0.10), transparent 55%),
      radial-gradient(120% 90% at 50% 100%, rgba(231,201,127,0.10), transparent 55%),
      linear-gradient(160deg, var(--card-back-1), var(--card-back-2));
    position:relative;
  }
  .face-back::before{ /* 内側の細い枠 */
    content:"";
    position:absolute; inset:9px;
    border:1px solid rgba(231,201,127,0.22);
    border-radius:12px;
    pointer-events:none;
  }
  .back-art{ width:78%; height:auto; opacity:0.95; }
  .back-art .meridian{ animation:pulseLine 4.5s ease-in-out infinite; }
  @keyframes pulseLine{
    0%,100%{ opacity:0.55; } 50%{ opacity:1; }
  }
  .back-label{
    position:absolute;
    bottom:14px; left:0; right:0;
    text-align:center;
    font-size:10px;
    letter-spacing:0.4em;
    color:rgba(231,201,127,0.7);
    text-indent:0.4em;
  }

  /* ============================================================
     経穴名 面
     ============================================================ */
  .face-name{
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:16px;
    padding:20px;
    text-align:center;
    background:
      radial-gradient(120% 80% at 50% 0%, rgba(127,231,239,0.16), transparent 60%),
      linear-gradient(165deg, #101826, #0a0f18);
  }
  .name-tag{
    font-size:12px;
    letter-spacing:0.42em;
    color:var(--cyan);
    text-indent:0.42em;
  }
  .name-main{
    font-family:"Hiragino Mincho ProN","Yu Mincho","YuMincho","MS Mincho",serif;
    font-weight:600;
    font-size:clamp(40px,13vw,72px);
    line-height:1.05;
    letter-spacing:0.08em;
    color:#fff;
    text-shadow:0 0 30px rgba(127,231,239,0.35);
  }
  .name-hint{
    margin-top:6px;
    font-size:12.5px;
    color:var(--faint);
    letter-spacing:0.06em;
  }
  .name-rule{
    width:54px;height:2px;
    background:linear-gradient(90deg,transparent,var(--cyan),transparent);
    border-radius:2px;
  }

  /* ============================================================
     詳細 面
     ============================================================ */
  .face-detail{
    flex-direction:column;
    padding:clamp(18px,5.2vw,26px);
    background:
      radial-gradient(120% 70% at 50% -10%, rgba(231,201,127,0.14), transparent 60%),
      linear-gradient(165deg, #141b29, #0b1018);
    text-align:left;
  }
  .detail-head{
    display:flex;
    align-items:baseline;
    gap:10px;
    padding-bottom:13px;
    margin-bottom:14px;
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .detail-name{
    font-family:"Hiragino Mincho ProN","Yu Mincho","YuMincho",serif;
    font-weight:600;
    font-size:clamp(28px,8vw,38px);
    letter-spacing:0.04em;
    color:#fff;
    line-height:1;
  }
  .detail-yoketsu{
    font-size:clamp(12px,3.4vw,14px);
    color:var(--gold-soft);
    letter-spacing:0.02em;
    margin-left:auto;
    text-align:right;
    line-height:1.35;
    max-width:52%;
  }
  .detail-yoketsu .lab{ display:block; color:var(--faint); font-size:10px; letter-spacing:0.16em; margin-bottom:2px; }

  .detail-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:auto;
  }
  .field{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.07);
    border-radius:12px;
    padding:11px 13px;
  }
  .field .lab{
    font-size:11px;
    letter-spacing:0.16em;
    color:var(--cyan);
    display:block;
    margin-bottom:5px;
  }
  .field .val{
    font-size:clamp(16px,4.6vw,19px);
    font-weight:700;
    color:var(--text);
    line-height:1.3;
  }

  .advice{
    margin-top:14px;
    display:flex;
    gap:10px;
    padding:12px 14px;
    border-radius:12px;
    background:linear-gradient(180deg, rgba(231,201,127,0.12), rgba(231,201,127,0.03));
    border:1px solid rgba(231,201,127,0.22);
  }
  .advice .ic{ color:var(--gold); flex:0 0 auto; font-size:15px; line-height:1.45; }
  .advice .txt{
    font-size:clamp(13.5px,3.9vw,15.5px);
    line-height:1.55;
    color:#e9eef4;
    letter-spacing:0.01em;
  }

  /* ============================================================
     拡大オーバーレイ（スポットライト）
     ============================================================ */
  .overlay{
    position:fixed; inset:0;
    z-index:50;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
    padding:max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
    background:rgba(4,6,10,0.68);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    opacity:0;
    visibility:hidden;
    transition:opacity .35s var(--ease), visibility .35s var(--ease);
  }
  .overlay.show{ opacity:1; visibility:visible; }

  .overlay__close{
    position:absolute;
    top:max(16px, env(safe-area-inset-top));
    right:18px;
    width:42px; height:42px;
    border-radius:50%;
    border:1px solid var(--panel-line);
    background:rgba(255,255,255,0.06);
    color:var(--text);
    font-size:22px;
    line-height:1;
    cursor:pointer;
    display:grid; place-items:center;
    transition:transform .2s var(--ease), background .2s, border-color .2s;
  }
  .overlay__close:hover{ background:rgba(255,255,255,0.12); border-color:rgba(127,231,239,0.5); transform:rotate(90deg); }

  .spotlight{
    position:relative;
    width:min(86vw, 58.5vh, 430px);
    aspect-ratio:3/4;
    perspective:1700px;
    cursor:pointer;
    will-change:transform;
    -webkit-tap-highlight-color:transparent;
  }
  .spotlight__inner{
    position:absolute;
    inset:0;
    transform-style:preserve-3d;
    transition:transform .72s var(--ease);
    will-change:transform;
  }
  .spotlight.flipped .spotlight__inner{ transform:rotateY(180deg); }

  .spotlight__face{
    position:absolute;
    inset:0;
    border-radius:24px;
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    overflow:hidden;
    border:1px solid rgba(127,231,239,0.28);
    box-shadow:0 36px 90px -34px rgba(0,0,0,0.92),
               0 0 40px -10px rgba(127,231,239,0.25);
    display:flex;
  }
  .spotlight__face--back{ transform:rotateY(180deg); }

  /* めくり時の発光リング（効果音の代替演出） */
  .spotlight.flash .spotlight__inner::after{
    content:"";
    position:absolute; inset:-2px;
    border-radius:26px;
    pointer-events:none;
    box-shadow:0 0 0 1px rgba(127,231,239,0.7), 0 0 34px 6px rgba(127,231,239,0.45);
    animation:ring .6s var(--ease) forwards;
    z-index:5;
  }
  @keyframes ring{ 0%{opacity:0.95;} 100%{opacity:0;} }

  .overlay__hint{
    font-size:13.5px;
    color:var(--muted);
    letter-spacing:0.04em;
    text-align:center;
    min-height:1.2em;
  }
  .overlay__hint b{ color:var(--gold-soft); font-weight:700; }

  .overlay__dots{ display:flex; gap:9px; align-items:center; }
  .overlay__dots span{
    width:9px; height:9px; border-radius:50%;
    background:rgba(255,255,255,0.2);
    transition:background .3s, transform .3s, box-shadow .3s;
  }
  .overlay__dots span.on{
    background:var(--cyan);
    transform:scale(1.25);
    box-shadow:0 0 12px var(--cyan);
  }

  /* ============================================================
     フッター
     ============================================================ */
  footer{
    margin-top:26px;
    text-align:center;
    color:var(--faint);
    font-size:12px;
    letter-spacing:0.04em;
    line-height:1.7;
  }
  footer .accent{ color:var(--muted); }

  /* ============================================================
     縦画面 / スマホ最適化
     ============================================================ */
  @media(max-width:560px){
    header{ align-items:flex-start; }
    .toolbar{ width:100%; }
    .btn{ flex:1; justify-content:center; padding:11px 12px; font-size:13px; }
    .infobar{ flex-direction:column; align-items:stretch; gap:12px; }
    .status{ justify-content:flex-end; }
  }
  @media(max-width:380px){
    .grid{ gap:8px; }
  }

  /* 横向きスマホには縦推奨のヒント */
  .rotate-hint{ display:none; }
  @media (orientation:landscape) and (max-height:480px){
    .rotate-hint{
      display:flex; align-items:center; gap:8px;
      position:fixed; left:50%; bottom:14px; transform:translateX(-50%);
      z-index:60;
      padding:9px 16px; border-radius:999px;
      background:rgba(20,27,40,0.92);
      border:1px solid var(--panel-line);
      color:var(--gold-soft); font-size:12.5px; letter-spacing:0.04em;
      box-shadow:var(--shadow);
    }
  }

  @media (prefers-reduced-motion:reduce){
    *{ animation-duration:0.01ms !important; transition-duration:0.12s !important; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <!-- ヘッダー -->
    <header>
      <div class="title-block">
        <span class="eyebrow">経穴 取穴トレーニング</span>
        <h1>手の経穴くじ</h1>
        <p class="subtitle">9枚の中から選んで取穴を確認</p>
      </div>
      <div class="toolbar">
        <button class="btn" id="resetBtn" type="button">
          <span class="ic">↺</span>確認をリセット
        </button>
        <button class="btn btn--primary" id="shuffleBtn" type="button">
          <span class="ic">⤮</span>再シャッフル
        </button>
      </div>
    </header>

    <!-- 使い方 + 状態表示 -->
    <div class="infobar">
      <div class="steps">
        <span class="step"><span class="num">1</span>カードを選ぶと<b>拡大</b>表示</span>
        <span class="step-sep">›</span>
        <span class="step"><span class="num">2</span><b>経穴名</b>を見て取穴を考える</span>
        <span class="step-sep">›</span>
        <span class="step"><span class="num">3</span>タップで<b>詳細</b>を確認</span>
      </div>
      <div class="status">
        <span class="dot"></span>
        確認済み <span class="count" id="seenCount">0</span> / 9
      </div>
    </div>

    <!-- カードグリッド -->
    <div class="grid" id="grid" aria-label="経穴カード 9枚"></div>

    <footer>
      <span class="accent">カードをタップすると大きく拡大して表示します。</span>
      全25穴からランダムで9枚を抽出（重複なし）。<br>
      鍼灸学生向け・取穴練習用ツール
    </footer>
  </div>

  <!-- 拡大オーバーレイ -->
  <div class="overlay" id="overlay" aria-hidden="true">
    <button class="overlay__close" id="closeBtn" type="button" aria-label="閉じる">×</button>
    <div class="spotlight" id="spotlight" role="dialog" aria-modal="true" aria-label="拡大カード">
      <div class="spotlight__inner">
        <div class="spotlight__face spotlight__face--front" data-mode="back"></div>
        <div class="spotlight__face spotlight__face--back"  data-mode="back"></div>
      </div>
    </div>
    <div class="overlay__dots" id="overlayDots"><span></span><span></span></div>
    <div class="overlay__hint" id="overlayHint"></div>
  </div>

  <div class="rotate-hint">📱 縦画面でのご利用がおすすめです</div>

<script>
/* ================================================================
   データ：手の経穴 全25穴
   ================================================================ */
const POINTS = [
  { name:"尺沢", yoketsu:"合水穴",           stim:"直刺浅め",       angle:"90°",     depth:"3〜5mm",  advice:"肘窩なので深刺しない。血管に注意" },
  { name:"孔最", yoketsu:"郄穴",             stim:"直刺",          angle:"90°",     depth:"5〜10mm", advice:"前腕部で扱いやすい。響かせすぎない" },
  { name:"列欠", yoketsu:"絡穴・八脈交会穴",  stim:"横刺",          angle:"10〜15°", depth:"8mm",     advice:"橈骨茎状突起付近。骨際なので寝かせて浅く入れる" },
  { name:"曲池", yoketsu:"合土穴",           stim:"直刺",          angle:"90°",     depth:"1cm",     advice:"筋肉量がある。肘関節に向けすぎない" },

  { name:"中渚", yoketsu:"兪木穴",           stim:"直刺浅め",       angle:"90°",     depth:"2〜4mm",  advice:"手背の骨間。浅く刺激" }
];

/* ================================================================
   裏面のSVGエンブレム（経絡・経穴を連想させる抽象模様）
   ================================================================ */
const BACK_ART = `
<svg class="back-art" viewBox="0 0 200 270" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fe7ef"/>
      <stop offset="1" stop-color="#e7c97f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7fe7ef" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#7fe7ef" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="105" r="64" fill="none" stroke="url(#lg)" stroke-opacity="0.30" stroke-width="1"/>
  <circle cx="100" cy="105" r="52" fill="none" stroke="#e7c97f" stroke-opacity="0.28" stroke-width="1" stroke-dasharray="2 6"/>
  <circle cx="100" cy="105" r="40" fill="none" stroke="#7fe7ef" stroke-opacity="0.22" stroke-width="1"/>
  <path class="meridian" d="M100 30 C 60 70, 140 110, 100 150 C 70 180, 130 200, 100 235"
        fill="none" stroke="url(#lg)" stroke-opacity="0.7" stroke-width="1.4" stroke-linecap="round"/>
  <g class="meridian">
    <circle cx="100" cy="30"  r="9" fill="url(#glow)"/><circle cx="100" cy="30"  r="2.6" fill="#7fe7ef"/>
    <circle cx="111" cy="90"  r="9" fill="url(#glow)"/><circle cx="111" cy="90"  r="2.6" fill="#bfeef3"/>
    <circle cx="100" cy="150" r="9" fill="url(#glow)"/><circle cx="100" cy="150" r="2.6" fill="#f3e0b0"/>
    <circle cx="113" cy="200" r="9" fill="url(#glow)"/><circle cx="113" cy="200" r="2.6" fill="#bfeef3"/>
    <circle cx="100" cy="235" r="9" fill="url(#glow)"/><circle cx="100" cy="235" r="2.6" fill="#e7c97f"/>
  </g>
  <text x="100" y="120" text-anchor="middle"
        font-family="'Hiragino Mincho ProN','Yu Mincho',serif"
        font-size="58" fill="#fff" fill-opacity="0.10" font-weight="600">經</text>
</svg>
<span class="back-label">手 ・ 経 穴</span>
`;

/* 詳細・名前 面の中身を生成（拡大カード用） */
function faceContent(p){
  return `
    <div class="face-back">${BACK_ART}</div>
    <div class="face-name">
      <span class="name-tag">経 穴 名</span>
      <span class="name-rule"></span>
      <span class="name-main">${p.name}</span>
      <span class="name-hint">タップで詳細を確認</span>
    </div>
    <div class="face-detail">
      <div class="detail-head">
        <span class="detail-name">${p.name}</span>
        <span class="detail-yoketsu"><span class="lab">要穴</span>${p.yoketsu}</span>
      </div>
      <div class="detail-grid">
        <div class="field"><span class="lab">刺激方法</span><span class="val">${p.stim}</span></div>
        <div class="field"><span class="lab">角度</span><span class="val">${p.angle}</span></div>
        <div class="field"><span class="lab">深さ</span><span class="val">${p.depth}</span></div>
        <div class="field"><span class="lab">要穴分類</span><span class="val">${p.yoketsu}</span></div>
      </div>
      <div class="advice">
        <span class="ic">⚠</span>
        <span class="txt">${p.advice}</span>
      </div>
    </div>`;
}

/* ================================================================
   要素参照 & 状態
   ================================================================ */
const MODES = ["back","name","detail"];      // 0,1,2

const grid       = document.getElementById("grid");
const seenCountEl= document.getElementById("seenCount");
const overlay    = document.getElementById("overlay");
const spotlight  = document.getElementById("spotlight");
const spotFront  = spotlight.querySelector(".spotlight__face--front");
const spotBack   = spotlight.querySelector(".spotlight__face--back");
const overlayHint= document.getElementById("overlayHint");
const overlayDots= document.getElementById("overlayDots").children;

let deck = [];          // 現在の9穴
let cards = [];         // {el} の配列（グリッド）
let seen = new Set();   // 確認済みカードの index

let activeIdx = null;   // 拡大中のカード
let sStep = 0;          // 拡大カードの状態 0:裏 1:名前 2:詳細
let opening = false;    // 開く演出中フラグ
let revealTimer = null;

/* 重複なしで9枚を抽出（Fisher–Yates） */
function pickNine(){
  const pool = POINTS.slice();
  for(let i = pool.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, 9);
}

/* グリッド生成 */
function buildGrid(){
  grid.innerHTML = "";
  cards = [];
  for(let i = 0; i < 9; i++){
    const card = document.createElement("div");
    card.className = "card";
    card.tabIndex = 0;
    card.setAttribute("role", "button");
    card.setAttribute("aria-label", "カードを引く");
    card.innerHTML = `
      <span class="seen-badge">✓</span>
      <div class="card__face" data-mode="back">
        <div class="face-back">${BACK_ART}</div>
      </div>`;

    card.addEventListener("click", () => openSpotlight(i));
    card.addEventListener("keydown", (e) => {
      if(e.key === "Enter" || e.key === " "){ e.preventDefault(); openSpotlight(i); }
    });

    grid.appendChild(card);
    cards.push({ el: card });
  }
}

/* 9穴を配り直す（演出付き） */
function dealPoints(animate = true){
  deck = pickNine();
  seen.clear();
  cards.forEach((c, i) => {
    c.el.classList.remove("viewed");
    if(animate){
      c.el.classList.remove("enter");
      c.el.style.animationDelay = (i * 55) + "ms";
      void c.el.offsetWidth;       // リフロー強制で再生
      c.el.classList.add("enter");
    }
  });
  updateSeenCount();
}

/* ===== 拡大オーバーレイ ===== */
function openSpotlight(idx){
  if(activeIdx !== null) return;        // 多重オープン防止
  activeIdx = idx;
  const p = deck[idx];

  // 中身をセット（最初は裏面＝グリッドと同じ見た目）
  spotFront.innerHTML = faceContent(p);
  spotBack.innerHTML  = faceContent(p);
  spotFront.dataset.mode = "back";
  spotBack.dataset.mode  = "back";
  spotlight.classList.remove("flipped", "flash");
  sStep = 0;
  opening = true;

  overlay.classList.add("show");
  overlay.setAttribute("aria-hidden", "false");
  document.body.style.overflow = "hidden";
  updateOverlayUI();

  // タップしたカード位置から拡大（FLIP）
  const src = cards[idx].el.getBoundingClientRect();
  spotlight.style.transition = "none";
  spotlight.style.transform  = "none";
  spotlight.style.opacity    = "1";
  const tgt = spotlight.getBoundingClientRect();
  const dx = (src.left + src.width/2) - (tgt.left + tgt.width/2);
  const dy = (src.top  + src.height/2) - (tgt.top  + tgt.height/2);
  const sc = src.width / tgt.width;
  spotlight.style.transform = `translate(${dx}px, ${dy}px) scale(${sc})`;

  requestAnimationFrame(() => {
    spotlight.style.transition = "transform .48s var(--ease)";
    spotlight.style.transform  = "none";
  });

  // 拡大しきったら経穴名を「めくって」見せる
  clearTimeout(revealTimer);
  revealTimer = setTimeout(() => { advance(); opening = false; }, 430);
}

/* 拡大カードの状態を1つ進める（裏→名前→詳細） */
function advance(){
  const next = sStep + 1;                 // 1:name / 2:detail
  const willFlip = !spotlight.classList.contains("flipped");
  const incoming = willFlip ? spotBack : spotFront;
  incoming.dataset.mode = MODES[next];
  spotlight.classList.toggle("flipped");
  sStep = next;

  // めくり演出
  spotlight.classList.remove("flash");
  void spotlight.offsetWidth;
  spotlight.classList.add("flash");

  if(next === 2 && activeIdx !== null){   // 詳細を見たら「確認済み」
    seen.add(activeIdx);
    cards[activeIdx].el.classList.add("viewed");
    updateSeenCount();
  }
  updateOverlayUI();
}

/* 拡大カードのタップ：詳細まで進めたら閉じる */
function tapSpotlight(){
  if(opening) return;
  if(sStep < 2) advance();
  else closeSpotlight();
}

/* 閉じる（カード位置へ戻す） */
function closeSpotlight(){
  if(activeIdx === null) return;
  clearTimeout(revealTimer);

  const src = cards[activeIdx].el.getBoundingClientRect();
  const tgt = spotlight.getBoundingClientRect();
  const dx = (src.left + src.width/2) - (tgt.left + tgt.width/2);
  const dy = (src.top  + src.height/2) - (tgt.top  + tgt.height/2);
  const sc = src.width / tgt.width;

  spotlight.style.transition = "transform .4s var(--ease), opacity .4s var(--ease)";
  spotlight.style.transform  = `translate(${dx}px, ${dy}px) scale(${sc})`;
  spotlight.style.opacity    = "0";

  overlay.classList.remove("show");
  overlay.setAttribute("aria-hidden", "true");
  document.body.style.overflow = "";

  setTimeout(() => {
    spotlight.classList.remove("flipped", "flash");
    spotlight.style.transition = "none";
    spotlight.style.transform  = "none";
    spotlight.style.opacity    = "";
    activeIdx = null;
    sStep = 0;
    opening = false;
  }, 410);
}

/* ヒント文・ドットの更新 */
function updateOverlayUI(){
  if(sStep <= 1){
    overlayHint.innerHTML = "経穴名から取穴をイメージ → <b>タップで詳細</b>";
  }else{
    overlayHint.innerHTML = "<b>もう一度タップ</b>で閉じてデッキに戻る";
  }
  overlayDots[0].classList.toggle("on", sStep <= 1);
  overlayDots[1].classList.toggle("on", sStep === 2);
}

function updateSeenCount(){
  seenCountEl.textContent = seen.size;
}

/* 確認済みの印だけリセット（同じ9枚のまま） */
function resetSeen(){
  seen.clear();
  cards.forEach(c => c.el.classList.remove("viewed"));
  updateSeenCount();
}

/* ================================================================
   イベント
   ================================================================ */
spotlight.addEventListener("click", (e) => { e.stopPropagation(); tapSpotlight(); });
overlay.addEventListener("click", closeSpotlight);                 // 背景タップで閉じる
document.getElementById("closeBtn").addEventListener("click", (e)=>{ e.stopPropagation(); closeSpotlight(); });
document.getElementById("shuffleBtn").addEventListener("click", () => { closeSpotlight(); dealPoints(true); });
document.getElementById("resetBtn").addEventListener("click", resetSeen);
document.addEventListener("keydown", (e) => {
  if(activeIdx === null) return;
  if(e.key === "Escape") closeSpotlight();
  else if(e.key === "Enter" || e.key === " "){ e.preventDefault(); tapSpotlight(); }
});

/* 初期化 */
buildGrid();
dealPoints(true);
</script>
