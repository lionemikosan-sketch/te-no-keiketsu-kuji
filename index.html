<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>手の経穴くじ｜取穴練習アプリ</title>
<style>
  /* ============================================================
     カラー / デザイントークン
     ============================================================ */
  :root{
    --bg-0:#06080c;
    --bg-1:#0b0f16;
    --bg-2:#121826;
    --panel:rgba(20,27,40,0.72);
    --panel-line:rgba(255,255,255,0.08);

    --gold:#e7c97f;
    --gold-soft:#f3e0b0;
    --cyan:#7fe7ef;
    --cyan-deep:#46b6c6;

    --text:#f3f6fa;
    --muted:#9aa7b6;
    --faint:#5f6b7a;

    --card-back-1:#0f1726;
    --card-back-2:#0a0f19;

    --shadow:0 18px 40px -18px rgba(0,0,0,0.85);
    --ease:cubic-bezier(0.2,0.8,0.2,1);

    --radius:18px;
  }

  *{ box-sizing:border-box; }

  html,body{ height:100%; }

  body{
    margin:0;
    color:var(--text);
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",
                "YuGothic","Meiryo",system-ui,sans-serif;
    background:
      radial-gradient(1100px 600px at 18% -10%, rgba(127,231,239,0.10), transparent 60%),
      radial-gradient(900px 600px at 110% 10%, rgba(231,201,127,0.10), transparent 55%),
      radial-gradient(900px 900px at 50% 120%, rgba(70,182,198,0.07), transparent 60%),
      linear-gradient(160deg, var(--bg-1), var(--bg-0) 60%);
    background-attachment:fixed;
    min-height:100%;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  /* 微細なノイズ風グレインで安っぽさを消す */
  body::before{
    content:"";
    position:fixed; inset:0;
    pointer-events:none;
    opacity:0.035;
    background-image:
      repeating-linear-gradient(0deg, #fff 0 1px, transparent 1px 3px),
      repeating-linear-gradient(90deg, #fff 0 1px, transparent 1px 3px);
    mix-blend-mode:overlay;
  }

  .wrap{
    max-width:1120px;
    margin:0 auto;
    padding:clamp(18px,3vw,40px) clamp(14px,3vw,32px) 56px;
    position:relative;
    z-index:1;
  }

  /* ============================================================
     ヘッダー
     ============================================================ */
  header{
    display:flex;
    flex-wrap:wrap;
    align-items:flex-end;
    justify-content:space-between;
    gap:18px 24px;
    margin-bottom:22px;
  }

  .title-block{ min-width:240px; }

  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    letter-spacing:0.28em;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .eyebrow::before{
    content:"";
    width:26px; height:1px;
    background:linear-gradient(90deg,var(--gold),transparent);
  }

  h1{
    margin:0;
    font-size:clamp(28px,4.4vw,46px);
    font-weight:800;
    letter-spacing:0.04em;
    line-height:1.1;
    background:linear-gradient(110deg,#ffffff 10%,var(--gold-soft) 55%,var(--cyan) 110%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 0 32px rgba(231,201,127,0.12);
  }

  .subtitle{
    margin:8px 0 0;
    color:var(--muted);
    font-size:clamp(13px,1.6vw,15px);
    letter-spacing:0.04em;
  }

  .toolbar{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:12px;
  }

  .btn{
    appearance:none;
    border:1px solid var(--panel-line);
    background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.015));
    color:var(--text);
    font-family:inherit;
    font-size:14px;
    font-weight:700;
    letter-spacing:0.04em;
    padding:11px 18px;
    border-radius:12px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:9px;
    transition:transform .18s var(--ease), box-shadow .25s var(--ease),
               border-color .25s, background .25s;
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
  }
  .btn:hover{
    transform:translateY(-2px);
    border-color:rgba(127,231,239,0.45);
    box-shadow:0 10px 26px -12px rgba(127,231,239,0.5);
  }
  .btn:active{ transform:translateY(0) scale(0.98); }

  .btn .ic{ font-size:15px; line-height:1; }

  .btn--primary{
    border-color:rgba(231,201,127,0.5);
    background:linear-gradient(180deg, rgba(231,201,127,0.22), rgba(231,201,127,0.06));
    color:var(--gold-soft);
  }
  .btn--primary:hover{
    border-color:rgba(231,201,127,0.8);
    box-shadow:0 12px 28px -12px rgba(231,201,127,0.55);
  }

  /* ============================================================
     使い方 + ステータス
     ============================================================ */
  .infobar{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:space-between;
    gap:12px 18px;
    padding:14px 18px;
    margin-bottom:26px;
    border:1px solid var(--panel-line);
    border-radius:14px;
    background:var(--panel);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
  }

  .steps{
    display:flex;
    flex-wrap:wrap;
    gap:10px 14px;
    align-items:center;
  }
  .step{
    display:inline-flex;
    align-items:center;
    gap:9px;
    font-size:13px;
    color:var(--muted);
    letter-spacing:0.02em;
  }
  .step b{ color:var(--text); font-weight:700; }
  .step .num{
    width:22px; height:22px;
    flex:0 0 auto;
    display:grid; place-items:center;
    border-radius:50%;
    font-size:12px;
    font-weight:800;
    color:var(--bg-0);
    background:linear-gradient(135deg,var(--cyan),var(--gold));
  }
  .step-sep{ color:var(--faint); }

  .status{
    display:inline-flex;
    align-items:center;
    gap:10px;
    font-size:13px;
    color:var(--muted);
    white-space:nowrap;
  }
  .status .count{
    font-weight:800;
    font-variant-numeric:tabular-nums;
    color:var(--gold-soft);
    font-size:15px;
  }
  .status .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--cyan);
    box-shadow:0 0 10px var(--cyan);
  }

  /* ============================================================
     カードグリッド
     ============================================================ */
  .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:clamp(12px,1.8vw,22px);
  }

  .card{
    position:relative;
    aspect-ratio:3/4;
    perspective:1400px;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    outline:none;
  }

  /* 入場アニメーション */
  .card.enter .card__inner{
    animation:dealIn .55s var(--ease) backwards;
  }
  @keyframes dealIn{
    0%{ opacity:0; transform:translateY(26px) rotateX(-14deg) scale(0.92); }
    100%{ opacity:1; transform:translateY(0) rotateX(0) scale(1); }
  }

  .card__inner{
    position:absolute;
    inset:0;
    transform-style:preserve-3d;
    transition:transform .72s var(--ease);
    will-change:transform;
  }
  .card.is-flipped .card__inner{ transform:rotateY(180deg); }

  /* タップ時の沈み込み */
  .card.press .card__inner{ transition:transform .72s var(--ease), filter .2s; }
  .card.press{ transform:scale(0.97); transition:transform .15s var(--ease); }

  /* ホバーで少し浮く（裏でも表でも） */
  @media(hover:hover){
    .card:hover .card__inner{ box-shadow:none; }
    .card:hover{ transform:translateY(-6px); }
    .card{ transition:transform .25s var(--ease); }
  }

  .card__face{
    position:absolute;
    inset:0;
    border-radius:var(--radius);
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    overflow:hidden;
    border:1px solid var(--panel-line);
    box-shadow:var(--shadow);
    display:flex;
  }
  .card__face--back{ transform:rotateY(180deg); }

  /* めくり時の発光リング（効果音の代替視覚演出） */
  .card.flash .card__inner::after{
    content:"";
    position:absolute; inset:-2px;
    border-radius:calc(var(--radius) + 2px);
    pointer-events:none;
    box-shadow:0 0 0 1px rgba(127,231,239,0.6), 0 0 26px 4px rgba(127,231,239,0.4);
    animation:ring .6s var(--ease) forwards;
    z-index:5;
  }
  @keyframes ring{
    0%{ opacity:0.9; }
    100%{ opacity:0; }
  }

  /* ---- 面ごとの表示切替（data-mode で制御）---- */
  .face-back,.face-name,.face-detail{ display:none; width:100%; height:100%; }
  .card__face[data-mode="back"]   .face-back{ display:flex; }
  .card__face[data-mode="name"]   .face-name{ display:flex; }
  .card__face[data-mode="detail"] .face-detail{ display:flex; }

  /* ============================================================
     裏面デザイン
     ============================================================ */
  .face-back{
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(120% 90% at 50% 0%, rgba(127,231,239,0.10), transparent 55%),
      radial-gradient(120% 90% at 50% 100%, rgba(231,201,127,0.10), transparent 55%),
      linear-gradient(160deg, var(--card-back-1), var(--card-back-2));
    position:relative;
  }
  .face-back::before{ /* 内側の細い枠 */
    content:"";
    position:absolute; inset:10px;
    border:1px solid rgba(231,201,127,0.22);
    border-radius:12px;
    pointer-events:none;
  }
  .back-art{ width:78%; height:auto; opacity:0.95; }
  .back-art .meridian{ animation:pulseLine 4.5s ease-in-out infinite; }
  @keyframes pulseLine{
    0%,100%{ opacity:0.55; } 50%{ opacity:1; }
  }
  .back-label{
    position:absolute;
    bottom:18px; left:0; right:0;
    text-align:center;
    font-size:11px;
    letter-spacing:0.4em;
    color:rgba(231,201,127,0.7);
    text-indent:0.4em;
  }

  /* ============================================================
     1タップ目：経穴名
     ============================================================ */
  .face-name{
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    padding:18px;
    text-align:center;
    background:
      radial-gradient(120% 80% at 50% 0%, rgba(127,231,239,0.14), transparent 60%),
      linear-gradient(165deg, #101826, #0a0f18);
    border-color:rgba(127,231,239,0.35);
  }
  .name-tag{
    font-size:11px;
    letter-spacing:0.42em;
    color:var(--cyan);
    text-indent:0.42em;
  }
  .name-main{
    font-family:"Hiragino Mincho ProN","Yu Mincho","YuMincho","MS Mincho",serif;
    font-weight:600;
    font-size:clamp(34px,6.2vw,58px);
    line-height:1.05;
    letter-spacing:0.06em;
    color:#fff;
    text-shadow:0 0 26px rgba(127,231,239,0.3);
  }
  .name-hint{
    margin-top:4px;
    font-size:11.5px;
    color:var(--faint);
    letter-spacing:0.06em;
  }
  .name-rule{
    width:46px;height:2px;
    background:linear-gradient(90deg,transparent,var(--cyan),transparent);
    border-radius:2px;
  }

  /* ============================================================
     2タップ目：詳細
     ============================================================ */
  .face-detail{
    flex-direction:column;
    padding:clamp(12px,1.6vw,18px);
    background:
      radial-gradient(120% 70% at 50% -10%, rgba(231,201,127,0.12), transparent 60%),
      linear-gradient(165deg, #141b29, #0b1018);
    border-color:rgba(231,201,127,0.32);
    text-align:left;
  }
  .detail-head{
    display:flex;
    align-items:baseline;
    gap:8px;
    padding-bottom:10px;
    margin-bottom:10px;
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .detail-name{
    font-family:"Hiragino Mincho ProN","Yu Mincho","YuMincho",serif;
    font-weight:600;
    font-size:clamp(20px,3.4vw,30px);
    letter-spacing:0.04em;
    color:#fff;
    line-height:1;
  }
  .detail-yoketsu{
    font-size:11px;
    color:var(--gold-soft);
    letter-spacing:0.02em;
    margin-left:auto;
    text-align:right;
    line-height:1.3;
    max-width:50%;
  }
  .detail-yoketsu .lab{ display:block; color:var(--faint); font-size:9.5px; letter-spacing:0.16em; }

  .detail-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-bottom:auto;
  }
  .field{
    background:rgba(255,255,255,0.035);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:10px;
    padding:8px 10px;
  }
  .field .lab{
    font-size:9.5px;
    letter-spacing:0.16em;
    color:var(--cyan);
    display:block;
    margin-bottom:3px;
  }
  .field .val{
    font-size:clamp(13px,1.7vw,15px);
    font-weight:700;
    color:var(--text);
    line-height:1.3;
  }

  .advice{
    margin-top:10px;
    display:flex;
    gap:8px;
    padding:9px 11px;
    border-radius:10px;
    background:linear-gradient(180deg, rgba(231,201,127,0.10), rgba(231,201,127,0.03));
    border:1px solid rgba(231,201,127,0.2);
  }
  .advice .ic{ color:var(--gold); flex:0 0 auto; font-size:13px; line-height:1.4; }
  .advice .txt{
    font-size:12px;
    line-height:1.5;
    color:#e9eef4;
    letter-spacing:0.01em;
  }

  .detail-hint{
    margin-top:8px;
    text-align:center;
    font-size:10.5px;
    color:var(--faint);
    letter-spacing:0.05em;
  }

  /* ============================================================
     フッター
     ============================================================ */
  footer{
    margin-top:30px;
    text-align:center;
    color:var(--faint);
    font-size:12px;
    letter-spacing:0.04em;
    line-height:1.7;
  }
  footer .accent{ color:var(--muted); }

  /* ============================================================
     レスポンシブ
     ============================================================ */
  @media(max-width:560px){
    .infobar{ flex-direction:column; align-items:flex-start; }
    .detail-grid{ grid-template-columns:1fr 1fr; }
    .toolbar{ width:100%; }
    .btn{ flex:1; justify-content:center; }
  }
  @media(max-width:380px){
    .grid{ gap:9px; }
    .detail-grid{ grid-template-columns:1fr; }
  }

  @media (prefers-reduced-motion:reduce){
    *{ animation-duration:0.01ms !important; transition-duration:0.1ms !important; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <!-- ヘッダー -->
    <header>
      <div class="title-block">
        <span class="eyebrow">経穴 取穴トレーニング</span>
        <h1>手の経穴くじ</h1>
        <p class="subtitle">9枚の中から選んで取穴を確認</p>
      </div>
      <div class="toolbar">
        <button class="btn" id="resetBtn" type="button">
          <span class="ic">↺</span>全カードを裏に戻す
        </button>
        <button class="btn btn--primary" id="shuffleBtn" type="button">
          <span class="ic">⤮</span>再シャッフル
        </button>
      </div>
    </header>

    <!-- 使い方 + 状態表示 -->
    <div class="infobar">
      <div class="steps">
        <span class="step"><span class="num">1</span><b>経穴名</b>を見る</span>
        <span class="step-sep">›</span>
        <span class="step"><span class="num">2</span><b>要穴・刺激方法</b>などを確認</span>
        <span class="step-sep">›</span>
        <span class="step"><span class="num">3</span>裏面に戻る</span>
      </div>
      <div class="status">
        <span class="dot"></span>
        公開中 <span class="count" id="openCount">0</span> / 9
      </div>
    </div>

    <!-- カードグリッド -->
    <div class="grid" id="grid" aria-label="経穴カード 9枚"></div>

    <footer>
      <span class="accent">タップで状態が切り替わります。</span> 全25穴からランダムで9枚を抽出（重複なし）。<br>
      鍼灸学生向け・取穴練習用ツール
    </footer>
  </div>

<script>
/* ================================================================
   データ：手の経穴 全25穴
   ================================================================ */
const POINTS = [
  { name:"尺沢", yoketsu:"合水穴",           stim:"直刺浅め",       angle:"90°",     depth:"3〜5mm",  advice:"肘窩なので深刺しない。血管に注意" },
  { name:"孔最", yoketsu:"郄穴",             stim:"直刺",          angle:"90°",     depth:"5〜10mm", advice:"前腕部で扱いやすい。響かせすぎない" },
  { name:"列欠", yoketsu:"絡穴・八脈交会穴",  stim:"横刺",          angle:"10〜15°", depth:"8mm",     advice:"橈骨茎状突起付近。骨際なので寝かせて浅く入れる" },
  { name:"曲池", yoketsu:"合土穴",           stim:"直刺",          angle:"90°",     depth:"1cm",     advice:"筋肉量がある。肘関節に向けすぎない" },
  { name:"温溜", yoketsu:"郄穴",             stim:"直刺",          angle:"90°",     depth:"1cm",     advice:"前腕部で扱いやすい。強刺激にしすぎない" },
  { name:"偏歴", yoketsu:"絡穴",             stim:"斜刺・流注に沿う", angle:"15〜30°", depth:"3〜5mm",  advice:"大腸経の流れ、手から肘方向を意識" },
  { name:"合谷", yoketsu:"原穴",             stim:"直刺",          angle:"90°",     depth:"1cm",     advice:"代表穴だが痛みが出やすい。強刺激にしない" },
  { name:"少海", yoketsu:"合水穴",           stim:"直刺浅め",       angle:"90°",     depth:"3〜5mm",  advice:"肘内側。尺骨神経側への強刺激に注意" },
  { name:"通里", yoketsu:"絡穴",             stim:"斜刺・流注に沿う", angle:"15〜30°", depth:"2〜4mm",  advice:"心経の流れ、肘から小指方向を意識" },
  { name:"神門", yoketsu:"兪土穴・原穴",      stim:"お灸",          angle:"なし",    depth:"刺入なし", advice:"手関節横紋部。血管・神経に注意し、灸で安全に刺激" },
  { name:"少府", yoketsu:"滎火穴",           stim:"お灸",          angle:"なし",    depth:"刺入なし", advice:"手掌部は痛みが出やすい。灸で軽く刺激する" },
  { name:"小海", yoketsu:"合土穴",           stim:"直刺",          angle:"90°",     depth:"5mm",     advice:"尺骨神経に近い。ビリッとしたら即中止" },
  { name:"支正", yoketsu:"絡穴",             stim:"直刺",          angle:"90°",     depth:"5〜10mm", advice:"前腕尺側で扱いやすい。骨際に寄りすぎない" },
  { name:"養老", yoketsu:"郄穴",             stim:"横刺",          angle:"10〜15°", depth:"8mm",     advice:"骨際で響きやすい。角度を寝かせて入れる" },
  { name:"後渓", yoketsu:"兪木穴・八脈交会穴", stim:"直刺浅め",       angle:"90°",     depth:"2〜4mm",  advice:"手を握らせて取穴。強く刺さない" },
  { name:"曲沢", yoketsu:"合水穴",           stim:"直刺浅め",       angle:"90°",     depth:"3〜5mm",  advice:"肘窩なので血管に注意。深刺しない" },
  { name:"郄門", yoketsu:"郄穴",             stim:"直刺",          angle:"90°",     depth:"5〜10mm", advice:"前腕中央で扱いやすい。響かせすぎない" },
  { name:"間使", yoketsu:"経金穴",           stim:"直刺浅め",       angle:"90°",     depth:"3〜5mm",  advice:"正中神経方向へ深追いしない" },
  { name:"内関", yoketsu:"絡穴・八脈交会穴",  stim:"直刺浅め",       angle:"90°",     depth:"3〜5mm",  advice:"代表穴だが深刺しない。しびれが出たら即中止" },
  { name:"大陵", yoketsu:"兪土穴・原穴",      stim:"手首に向けて切皮", angle:"10〜15°", depth:"切皮のみ", advice:"手関節中央。正中神経に注意し、深く入れない" },
  { name:"天井", yoketsu:"合土穴",           stim:"直刺",          angle:"90°",     depth:"5〜10mm", advice:"肘周辺。関節に向けすぎない" },
  { name:"支溝", yoketsu:"経火穴",           stim:"斜刺・流注に沿う", angle:"15〜30°", depth:"3〜5mm",  advice:"三焦経の流れ、手から肘方向を意識" },
  { name:"外関", yoketsu:"絡穴・八脈交会穴",  stim:"斜刺",          angle:"15〜30°", depth:"1cm",     advice:"手から肘方向へ斜刺。深く入れすぎない" },
  { name:"陽池", yoketsu:"原穴",             stim:"お灸",          angle:"なし",    depth:"刺入なし", advice:"手関節背側。関節部なので灸で安全に刺激" },
  { name:"中渚", yoketsu:"兪木穴",           stim:"直刺浅め",       angle:"90°",     depth:"2〜4mm",  advice:"手背の骨間。浅く刺激" }
];

/* ================================================================
   裏面のSVGエンブレム（経絡・経穴を連想させる抽象模様）
   ================================================================ */
const BACK_ART = `
<svg class="back-art" viewBox="0 0 200 270" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fe7ef"/>
      <stop offset="1" stop-color="#e7c97f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7fe7ef" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#7fe7ef" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 同心円 -->
  <circle cx="100" cy="105" r="64" fill="none" stroke="url(#lg)" stroke-opacity="0.30" stroke-width="1"/>
  <circle cx="100" cy="105" r="52" fill="none" stroke="#e7c97f" stroke-opacity="0.28" stroke-width="1" stroke-dasharray="2 6"/>
  <circle cx="100" cy="105" r="40" fill="none" stroke="#7fe7ef" stroke-opacity="0.22" stroke-width="1"/>
  <!-- 経絡ライン（蛇行）と経穴ノード -->
  <path class="meridian" d="M100 30 C 60 70, 140 110, 100 150 C 70 180, 130 200, 100 235"
        fill="none" stroke="url(#lg)" stroke-opacity="0.7" stroke-width="1.4" stroke-linecap="round"/>
  <g class="meridian">
    <circle cx="100" cy="30"  r="9" fill="url(#glow)"/><circle cx="100" cy="30"  r="2.6" fill="#7fe7ef"/>
    <circle cx="111" cy="90"  r="9" fill="url(#glow)"/><circle cx="111" cy="90"  r="2.6" fill="#bfeef3"/>
    <circle cx="100" cy="150" r="9" fill="url(#glow)"/><circle cx="100" cy="150" r="2.6" fill="#f3e0b0"/>
    <circle cx="113" cy="200" r="9" fill="url(#glow)"/><circle cx="113" cy="200" r="2.6" fill="#bfeef3"/>
    <circle cx="100" cy="235" r="9" fill="url(#glow)"/><circle cx="100" cy="235" r="2.6" fill="#e7c97f"/>
  </g>
  <!-- 中央の文字 -->
  <text x="100" y="120" text-anchor="middle"
        font-family="'Hiragino Mincho ProN','Yu Mincho',serif"
        font-size="58" fill="#fff" fill-opacity="0.10" font-weight="600">經</text>
</svg>
<span class="back-label">手 ・ 経 穴</span>
`;

/* 1枚分の中身（裏 / 名前 / 詳細）の HTML を生成 */
function faceContent(p){
  return `
    <div class="face-back">${BACK_ART}</div>
    <div class="face-name">
      <span class="name-tag">経 穴 名</span>
      <span class="name-rule"></span>
      <span class="name-main">${p.name}</span>
      <span class="name-hint">もう一度タップで詳細</span>
    </div>
    <div class="face-detail">
      <div class="detail-head">
        <span class="detail-name">${p.name}</span>
        <span class="detail-yoketsu"><span class="lab">要穴</span>${p.yoketsu}</span>
      </div>
      <div class="detail-grid">
        <div class="field"><span class="lab">刺激方法</span><span class="val">${p.stim}</span></div>
        <div class="field"><span class="lab">角度</span><span class="val">${p.angle}</span></div>
        <div class="field"><span class="lab">深さ</span><span class="val">${p.depth}</span></div>
        <div class="field"><span class="lab">要穴分類</span><span class="val">${p.yoketsu}</span></div>
      </div>
      <div class="advice">
        <span class="ic">⚠</span>
        <span class="txt">${p.advice}</span>
      </div>
      <div class="detail-hint">タップで裏面に戻る</div>
    </div>`;
}

/* ================================================================
   状態管理
   ================================================================ */
const MODES = ["back","name","detail"];   // 0,1,2
const grid = document.getElementById("grid");
const openCountEl = document.getElementById("openCount");

let cards = [];   // {el, inner, front, back, state} の配列

/* 重複なしで9枚を抽出（Fisher–Yates） */
function pickNine(){
  const pool = POINTS.slice();
  for(let i = pool.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, 9);
}

/* カードDOMを9枚生成 */
function buildCards(){
  grid.innerHTML = "";
  cards = [];
  for(let i = 0; i < 9; i++){
    const card = document.createElement("div");
    card.className = "card";
    card.tabIndex = 0;
    card.setAttribute("role","button");
    card.dataset.state = "0";
    card.innerHTML = `
      <div class="card__inner">
        <div class="card__face card__face--front" data-mode="back"></div>
        <div class="card__face card__face--back"  data-mode="back"></div>
      </div>`;

    const obj = {
      el: card,
      inner: card.querySelector(".card__inner"),
      front: card.querySelector(".card__face--front"),
      back:  card.querySelector(".card__face--back"),
      state: 0
    };

    const handler = () => flipCard(obj);
    card.addEventListener("click", handler);
    card.addEventListener("keydown", (e) => {
      if(e.key === "Enter" || e.key === " "){ e.preventDefault(); handler(); }
    });

    grid.appendChild(card);
    cards.push(obj);
  }
}

/* 9穴を割り当て、すべて裏面にリセット（演出付き） */
function dealPoints(animate = true){
  const picks = pickNine();
  cards.forEach((c, i) => {
    const html = faceContent(picks[i]);
    c.front.innerHTML = html;
    c.back.innerHTML  = html;
    c.front.dataset.mode = "back";
    c.back.dataset.mode  = "back";
    c.state = 0;
    c.el.dataset.state = "0";
    c.el.classList.remove("is-flipped");

    if(animate){
      c.el.classList.remove("enter");
      c.inner.style.animationDelay = (i * 55) + "ms";
      // リフロー強制でアニメ再生
      void c.el.offsetWidth;
      c.el.classList.add("enter");
    }
  });
  updateCount();
}

/* カードをめくる：back → name → detail → back */
function flipCard(c){
  const next = (c.state + 1) % 3;

  // これから表に出てくる面を判定して、その面に新しい状態を設定
  const willFlip = !c.el.classList.contains("is-flipped");
  const incoming = willFlip ? c.back : c.front;
  incoming.dataset.mode = MODES[next];

  c.el.classList.toggle("is-flipped");
  c.state = next;
  c.el.dataset.state = String(next);

  // 視覚的な「めくり感」演出
  c.el.classList.remove("flash");
  void c.el.offsetWidth;
  c.el.classList.add("flash");
  c.el.classList.add("press");
  setTimeout(() => c.el.classList.remove("press"), 160);

  updateCount();
}

/* 公開中（裏面以外）の枚数を更新 */
function updateCount(){
  const open = cards.filter(c => c.state !== 0).length;
  openCountEl.textContent = open;
}

/* 全カードを裏に戻す（割り当て穴は維持） */
function resetAll(){
  cards.forEach((c) => {
    if(c.state === 0) return;
    // 裏面に戻すために、出てくる面へ back を設定してからフリップ
    const willFlip = !c.el.classList.contains("is-flipped");
    const incoming = willFlip ? c.back : c.front;
    incoming.dataset.mode = "back";
    c.el.classList.toggle("is-flipped");
    c.state = 0;
    c.el.dataset.state = "0";
  });
  updateCount();
}

/* ================================================================
   初期化 & イベント
   ================================================================ */
document.getElementById("shuffleBtn").addEventListener("click", () => dealPoints(true));
document.getElementById("resetBtn").addEventListener("click", resetAll);

buildCards();
dealPoints(true);
</script>
</body>
</html>
